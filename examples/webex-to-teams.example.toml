name = "webex-to-teams"
mode = "individual"
workspace = ".exodus/webex-to-teams"
runtime = "local"

[source]
kind = "webex"
auth = "env:WEBEX_ACCESS_TOKEN"
scope = "user_rooms"
room_ids = []
message_since = "2020-01-01T00:00:00Z"
message_before = "2026-01-01T00:00:00Z"

[target]
kind = "teams"
auth = "graph"
tenant_id = "env:MICROSOFT_TENANT_ID"
client_id = "env:MICROSOFT_CLIENT_ID"
client_secret = "env:MICROSOFT_CLIENT_SECRET"
